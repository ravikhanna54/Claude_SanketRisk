# SanketRisk ONE — Netlify Configuration
[build]
  functions = "netlify/functions"

[[redirects]]
  from = "/"
  to = "/dashboard.html"
  status = 302

[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/scan"
  to = "/scan.html"
  status = 200

[[redirects]]
  from = "/request"
  to = "/request.html"
  status = 200

[[redirects]]
  from = "/backup"
  to = "/backup.html"
  status = 200

[[redirects]]
  from = "/marketing"
  to = "/marketing.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/marketing.html"
  status = 200

[functions]
  node_bundler = "esbuild"

[functions.scan-proxy]
  timeout = 10

[functions.scan-test]
  timeout = 10
