# Deploy: 2026-05-14
[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "zisi"

[[redirects]]
  from = "/esi"
  to = "/esi.html"
  status = 200

[[redirects]]
  from = "/backup"
  to = "/backup.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/marketing.html"
  status = 200

[[redirects]]
  from = "/marketing"
  to = "/marketing.html"
  status = 200

[[redirects]]
  from = "/scan"
  to = "/scan.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/request"
  to = "/request.html"
  status = 200

[[redirects]]
  from = "/status"
  to = "/status.html"
  status = 200

[[redirects]]
  from = "/report"
  to = "/report.html"
  status = 200

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0"
    Pragma = "no-cache"
    Expires = "0"
    Surrogate-Control = "no-store"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0"
    Pragma = "no-cache"
    Expires = "0"

[functions."profile-search"]
  timeout = 26
